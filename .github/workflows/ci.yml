name: CI

on:
  pull_request:
    branches:
    - master
  push:
    branches:
    - master

env:
  OBSTOR_ROOT_USER: obstor
  OBSTOR_ROOT_PASSWORD: obstor123
  OBSTOR_CI_CD: 1
  MINT_MODE: full
  SERVER_ENDPOINT: localhost:9000
  ACCESS_KEY: obstor
  SECRET_KEY: obstor123
  ENABLE_HTTPS: 1

# This ensures that previous jobs for the PR are canceled when the PR is
# updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test on python ${{ matrix.python-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Run spell check on Ubuntu
      if: matrix.os == 'ubuntu-latest'
      uses: codespell-project/actions-codespell@master
      with:
        ignore_words_list: assertIn
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install certifi urllib3 mock pytest argon2-cffi pycryptodome
    - name: Run check if Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        export PATH=${HOME}/.local/bin:${PATH}
        make check
    - name: Setup PATH if macOS
      if: matrix.os == 'macos-latest'
      run: |
        echo "/Users/runner/Library/Python/3.11/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "/Users/runner/.local/bin" >> $GITHUB_PATH
    - name: Run unit tests
      run: |
        pip install -e .
        pytest
    - name: Run functional tests on Ubuntu
      env:
        PYTHON_GIL: ${{ (matrix.python-version == '3.14t') && '0' || '' }}
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget --quiet -O /tmp/obstor https://dl.pgg.net/server/obstor/release/linux-amd64/obstor
        chmod +x /tmp/obstor
        mkdir -p /tmp/obstor-config/certs/
        cp tests/certs/* /tmp/obstor-config/certs/
        /tmp/obstor --certs-dir /tmp/obstor-config/certs server /tmp/fs{1...4} &
        SSL_CERT_FILE=/tmp/obstor-config/certs/public.crt python tests/functional/tests.py
    - name: Run functional tests on Windows
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Path "$env:temp/obstor-config/certs/"
        Copy-Item -Path tests\certs\* -Destination "$env:temp/obstor-config/certs/"
        Invoke-WebRequest -Uri https://dl.pgg.net/server/obstor/release/windows-amd64/obstor.exe -OutFile $HOME/obstor.exe
        Start-Process -NoNewWindow -FilePath "$HOME/obstor.exe" -ArgumentList "--certs-dir", "$env:temp/obstor-config/certs", "server", "$env:temp/fs{1...4}"
        $env:SSL_CERT_FILE = "$env:temp/obstor-config/certs/public.crt"
        python tests/functional/tests.py
